schema: spec-driven

context: |
  Project: gh-attach — CLI tool and MCP server for attaching images to GitHub issues, PRs, and comments.
  Tech stack: TypeScript, Node.js, Commander.js, Vitest, @modelcontextprotocol/server
  Build: tsup (ESM output), semantic-release for versioning
  Distribution: npm package, gh CLI extension, MCP server (stdio + HTTP)
  Testing: Vitest for unit tests, msw for integration, real GitHub E2E suite
  CI: GitHub Actions with matrix builds (Node 20/22, ubuntu/macos)
  Conventions: Conventional Commits, strict TypeScript, ESLint + Prettier

rules:
  specs:
    - Use Given/When/Then format for all scenarios
    - Include error scenarios for every requirement
    - Specify exact CLI flags, exit codes, and output formats
  design:
    - Include architecture diagrams using ASCII art
    - Document all undocumented GitHub API interactions explicitly
  tasks:
    - Each task must be independently testable
    - Include acceptance criteria referencing specific test files
